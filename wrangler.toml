name = "camp-planner"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Deploy to subdomain
routes = [
  { pattern = "camp.cuuush.com/*", zone_name = "cuuush.com" }
]

[[d1_databases]]
binding = "DB"
database_name = "camp-planner-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[observability]
[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
persist = true
