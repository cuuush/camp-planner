name = "camp-planner"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Deploy to subdomain
routes = [
  { pattern = "camp.cuuush.com/*", zone_name = "cuuush.com" }
]

# Static assets (wallpaper, badges, etc). Files here are served directly;
# anything that doesn't match a file falls through to the worker.
[assets]
directory = "./public"

[[d1_databases]]
binding = "DB"
database_name = "camp-planner-db"
database_id = "2b906fa5-e18b-45ff-aa92-77e75a4aec7b"

[observability]
[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
persist = true
